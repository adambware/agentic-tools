# OWASP ASVS Base Security Taxonomy
# =================================
#
# The BASE library of security vectors, versioned ONCE in the engine. Packs clone
# these entries into their own .nightshift/registries/vectors.yml and extend with
# project-specific surfaces (see taxonomy/README.md and the BearHost BH-SEC-* set).
#
# Every entry is a registry entry conforming to schemas/registry-entry.yml:
#   kind: vector, owner: security. Plus an `asvs_ref` so findings can cite the
#   ASVS chapter (e.g. "ASVS 4.0.3 V2.1").
#
# `area` globs here are GENERIC PLACEHOLDERS. Each pack REMAPS them from its own
# REPO_MAP.yml to real paths — the globs below are starting hints, not truth.
#
# weight -> interval_days suggested mapping: critical 7 / high 14 / medium 30 / low 90.
# last_reviewed / status / linear are (auto) and unset until the engine runs.
#
# Lean, high-value base set (12 vectors). Not exhaustive — packs add coverage.
# ---------------------------------------------------------------------------

vectors:

  - id:            ASVS-AUTH-01
    title:         "Authentication: credential verification & brute-force resistance"
    kind:          vector
    area:          ["**/auth/**", "**/*Auth*", "**/login/**", "**/sessions/**"]   # packs remap via REPO_MAP
    weight:        critical
    interval_days: 7
    owner:         security
    asvs_ref:      "ASVS 4.0.3 V2.1 (Authentication / Password Security)"

  - id:            ASVS-SESS-02
    title:         "Session management: token binding, fixation, rotation & logout"
    kind:          vector
    area:          ["**/session/**", "**/middleware/**", "**/*Session*"]   # packs remap via REPO_MAP
    weight:        critical
    interval_days: 7
    owner:         security
    asvs_ref:      "ASVS 4.0.3 V3.2 (Session Management / Session Binding)"

  - id:            ASVS-AC-03
    title:         "Access control / authorization: function & object-level checks (IDOR)"
    kind:          vector
    area:          ["**/*Controller*", "**/*Policy*", "**/policies/**", "**/middleware/**"]   # packs remap via REPO_MAP
    weight:        critical
    interval_days: 7
    owner:         security
    asvs_ref:      "ASVS 4.0.3 V4.2 (Access Control / Operation Level)"

  - id:            ASVS-INPV-04
    title:         "Input validation & injection (SQLi, command, template injection)"
    kind:          vector
    area:          ["**/*Controller*", "**/queries/**", "**/repositories/**", "**/*Repository*"]   # packs remap via REPO_MAP
    weight:        critical
    interval_days: 7
    owner:         security
    asvs_ref:      "ASVS 4.0.3 V5.3 (Validation, Sanitization / Output Encoding & Injection)"

  - id:            ASVS-SECRET-05
    title:         "Secrets & credential storage: at-rest protection, no hardcoded keys"
    kind:          vector
    area:          ["**/config/**", "**/.env*", "**/secrets/**", "**/*Credential*"]   # packs remap via REPO_MAP
    weight:        critical
    interval_days: 7
    owner:         security
    asvs_ref:      "ASVS 4.0.3 V6.4 (Stored Cryptography / Secret Management)"

  - id:            ASVS-DEP-06
    title:         "Dependency / SCA: known-vulnerable & unmaintained components"
    kind:          vector
    area:          ["**/package*.json", "**/composer.*", "**/go.mod", "**/requirements*.txt", "**/*.lock"]   # packs remap via REPO_MAP
    weight:        high
    interval_days: 14
    owner:         security
    asvs_ref:      "ASVS 4.0.3 V14.2 (Configuration / Dependency)"

  - id:            ASVS-RATE-07
    title:         "Rate limiting / anti-automation on sensitive endpoints"
    kind:          vector
    area:          ["**/middleware/**", "**/routes/**", "**/*Throttle*", "**/*RateLimit*"]   # packs remap via REPO_MAP
    weight:        high
    interval_days: 14
    owner:         security
    asvs_ref:      "ASVS 4.0.3 V2.2 (Authentication / General Authenticator)"

  - id:            ASVS-CRYPTO-08
    title:         "Cryptography in transit & at rest: TLS config, strong algorithms"
    kind:          vector
    area:          ["**/config/**", "**/*Crypto*", "**/*Cipher*", "**/tls/**"]   # packs remap via REPO_MAP
    weight:        high
    interval_days: 14
    owner:         security
    asvs_ref:      "ASVS 4.0.3 V6.2 (Stored Cryptography / Algorithms) & V9.1 (Communications)"

  - id:            ASVS-LOG-09
    title:         "Error handling & logging: no sensitive leakage, tamper-evident audit"
    kind:          vector
    area:          ["**/*Exception*", "**/*ErrorHandler*", "**/logging/**", "**/*Logger*"]   # packs remap via REPO_MAP
    weight:        medium
    interval_days: 30
    owner:         security
    asvs_ref:      "ASVS 4.0.3 V7.1 (Error Handling and Logging)"

  - id:            ASVS-SSRF-10
    title:         "SSRF: server-side fetchers of user/site-controlled URLs"
    kind:          vector
    area:          ["**/*Fetch*", "**/*HttpClient*", "**/*Webhook*", "**/proxy/**"]   # packs remap via REPO_MAP
    weight:        high
    interval_days: 14
    owner:         security
    asvs_ref:      "ASVS 4.0.3 V12.6 (Files and Resources / SSRF Protection)"

  - id:            ASVS-FILE-11
    title:         "File & resource handling: upload validation, path traversal, type confusion"
    kind:          vector
    area:          ["**/uploads/**", "**/*Upload*", "**/storage/**", "**/*File*"]   # packs remap via REPO_MAP
    weight:        high
    interval_days: 14
    owner:         security
    asvs_ref:      "ASVS 4.0.3 V12.1 (Files and Resources / File Upload)"

  - id:            ASVS-CONF-12
    title:         "Security configuration & headers: CSRF, CORS, secure defaults"
    kind:          vector
    area:          ["**/config/**", "**/middleware/**", "**/*Cors*", "**/*Csrf*", "**/*Headers*"]   # packs remap via REPO_MAP
    weight:        medium
    interval_days: 30
    owner:         security
    asvs_ref:      "ASVS 4.0.3 V14.4 (Configuration / HTTP Security Headers)"
