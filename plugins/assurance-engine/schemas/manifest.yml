# Pack Manifest Schema — manifest.yml (the portability layer)
# ===========================================================
#
# The manifest is what makes the engine project-agnostic. It lives at
# <repo>/.nightshift/manifest.yml and travels with the code. It tells the engine
# HOW to run against THIS project: how to test/build/drive a browser, what tools it
# may use, where evidence comes from, how to file in Linear, and how often + how much
# to review per run.
#
# This file is the ANNOTATED SCHEMA / reference. Values are generic placeholders;
# a pack's concrete instance (e.g. NovuDesk) overrides them. The manifest reuses the
# pack's plan-contract REPO_MAP.yml for area->path mappings (see registry-entry.yml).
# ---------------------------------------------------------------------------

project:          # string, REQUIRED. Short pack slug, e.g. "novudesk".

repos:            # list[object], REQUIRED. One entry per repo in the project.
                  # The engine reviews code across all listed repos.
  - path:         # string, REQUIRED. Repo path relative to the .nightshift root,
                  #   e.g. "." or "../nova-worker".
    stack:        # string, REQUIRED. Tech stack tag, e.g. "rails+hotwire" or "go".
                  #   Informs reviewer heuristics and the stack_adapter defaults.

stack_adapter:    # object, REQUIRED. How the engine interacts with this project.
  test:           # string, REQUIRED. Command to run the test suite,
                  #   e.g. "composer test". Used when an agent adds a failing
                  #   test that demonstrates a violated invariant.
  build:          # string, REQUIRED. Build command, e.g. "npm run build".
  browser:        # object, REQUIRED for the Designer lane (optional if security-only).
    tool:         # string. Browser automation tool, e.g. "playwright-mcp".
    base_url:     # string. Environment to drive, e.g. "https://staging.example...".
                  #   Use a staging/seeded environment, never production.

allowlist:        # list[string], REQUIRED. Tool permissions granted to reviewer agents.
                  # Least-privilege; mirrors Claude Code permission syntax. Example:
                  #   ["Read","Grep","Glob","Bash(composer test:*)","Bash(npm run *)",
                  #    "WebFetch", "<browser/MCP tool>"]
                  # Keep read/test-oriented; no destructive or offensive tooling.

evidence_sources: # list, REQUIRED (may be empty []). PM lane inputs.
                  # Sources of real product signal (support/churn/reviews/analytics).
                  # Empty [] until the PM lane is stood up — PM is deferred, and running
                  # it dry produces invented problems.

linear:           # object, REQUIRED. How findings become tickets.
  project:        # string. Linear project key, e.g. "NOVU".
  labels:         # object. Per-lane label to tag filed issues:
    security:     #   string, e.g. "sec-review".
    ux:           #   string, e.g. "ux-flow".
    pm:           #   string, e.g. "pm-gap".

cadences:         # object, REQUIRED. How often each lane's review run fires.
                  # Values: a schedule keyword (e.g. nightly | weekly) or "off".
  security:       #   e.g. nightly  (diff-triggered once vectors.yml is complete).
  designer:       #   e.g. weekly.
  pm:             #   e.g. off      (deferred until evidence_sources exist).

window_budget_k:  # object, REQUIRED. Top-K entries selected per run, per lane.
                  # Sized to fit ONE usage window — the bound that keeps runs lean.
                  # The engine sorts by staleness*weight and takes this many.
  security:       #   int, e.g. 6.
  designer:       #   int, e.g. 4.
                  # (No pm key until the PM lane is active.)
