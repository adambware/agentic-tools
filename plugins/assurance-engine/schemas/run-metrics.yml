# Run Metrics Schema — run_metrics (per run)
# ==========================================
#
# Every review run emits one run_metrics record (appended in .nightshift/findings/
# alongside the run log). These are the engine's self-measurement: they feed the
# weekly digest's false-positive rate and usage/throughput tracking. If the
# false-positive rate climbs, the lane's vectors/flows or thresholds need tuning.
#
# All fields are (auto) — engine-managed, written at the end of a run. Lean by design.
# ---------------------------------------------------------------------------

run_metrics:
  selected:                  # int, (auto). Entries chosen this run (top-K after
                             #   staleness*weight sort). Bounded by window_budget_k.

  reviewed:                  # int, (auto). Entries actually reviewed (<= selected;
                             #   may be lower if the usage window was exhausted).

  findings_created:          # int, (auto). Findings produced before second-reviewer
                             #   refutation and dedupe.

  confirmed:                 # int, (auto). Findings that survived refutation + dedupe
                             #   and were appended to the log.

  rejected_by_2nd_reviewer:  # int, (auto). Findings the independent second reviewer
                             #   refuted (did not log). Numerator of the false-positive
                             #   signal surfaced in the weekly digest.

  usage_spent:               # number/string, (auto). Model usage consumed this run
                             #   (e.g. tokens or usage-window fraction). Watches budget.

  elapsed:                   # duration/string, (auto). Wall-clock time for the run
                             #   (e.g. "11m" or seconds). Watches runtime drift.

# ---------------------------------------------------------------------------
# Example:
#
# example:
#   run_metrics:
#     selected:                 6
#     reviewed:                 6
#     findings_created:         4
#     confirmed:                2
#     rejected_by_2nd_reviewer: 2
#     usage_spent:              "0.8 window"
#     elapsed:                  "11m"
