# .nightshift/fixtures/personas.example.yml — seeded test personas (TEMPLATE)
# ===========================================================================
#
# Seeded test personas are the design-lane PREREQUISITE. The reviewer drives each
# stale/changed flow AS one of these personas against the staging base_url. Without a
# stable, seeded persona+data set the reviewer confuses environment drift with real
# friction — so this file gates the design lane.
#
# Copy this file to `personas.yml` and fill in real (seeded, non-production) personas.
# Persona schema fields (per the spec's design-lane prerequisite):
#   account_type, plan, permissions, data_seed, feature_flags, credentials_ref,
#   success_criteria.
#
# credentials_ref MUST point at a secrets reference (vault path / CI secret name),
# NEVER a real secret value committed to the repo.
# ---------------------------------------------------------------------------

personas:

  - id: new-user                       # stable handle referenced by flows.yml `persona:`
    account_type: individual           # individual | team-admin | member | …
    plan: starter                      # the seeded plan/tier for this persona
    permissions: [read, write]         # capability set granted to this persona
    data_seed: seeds/new-user.sql      # fixture that provisions this persona's data
    feature_flags:                     # flags forced on/off so the run is deterministic
      new_onboarding: true
      beta_dashboard: false
    credentials_ref: vault://staging/personas/new-user   # secrets reference, NOT a secret
    success_criteria: >                # what "the flow completed" objectively means
      Reaches the dashboard with a created first project in <= 6 steps and no errors.
