# .nightshift/registries/flows.yml — design flow registry (TEMPLATE)
# ====================================================================
#
# User-flow coverage for the design (friction & a11y) lane (kind: flow, owner: design).
# Each entry conforms to ${CLAUDE_PLUGIN_ROOT}/schemas/registry-entry.yml; `area` here is
# the route(s)/component(s) the flow exercises rather than backend code paths.
#
# PREREQUISITE (do not seed this file until BOTH exist):
#   1. A STAGING environment wired into manifest.stack_adapter.browser.base_url.
#   2. SEEDED TEST PERSONAS in ../fixtures/personas.yml. Without seeded personas the
#      reviewer confuses environment drift with real friction. See personas.example.yml.
#
# Until then leave `flows:` empty. The design lane is reachable but default-off — onboard
# security first.
# ---------------------------------------------------------------------------

flows: []

