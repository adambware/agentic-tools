# .nightshift/fixtures/personas.yml — NovuDesk seeded test personas
# =================================================================
#
# Seeded, non-production personas the Designer lane drives flows AS, against the staging
# base_url in manifest.yml. They make Designer runs deterministic so the reviewer
# measures real friction, not environment drift. Persona schema (spec Designer prereq):
#   account_type, plan, permissions, data_seed, feature_flags, credentials_ref,
#   success_criteria.
#
# credentials_ref points at a secrets reference (vault path), never a real secret value.
# ---------------------------------------------------------------------------

personas:

  - id: end-user
    account_type: customer         # a customer on the entry tier, owns their own tickets
    plan: starter
    permissions: [ticket.create, ticket.read_own]
    data_seed: seeds/end-user.sql            # a few of the customer's own tickets
    feature_flags:
      triage_gate: true
      agent_workspace: false
    credentials_ref: vault://staging/novudesk/personas/end-user
    success_criteria: >
      Submits a ticket from the customer portal and reaches the confirmation /
      ticket-detail screen in <= 6 steps, no dead-ends, no >2s waits.

  - id: support-agent
    account_type: agent            # triages incoming tickets, reviews Triage Gate suggestions
    plan: team
    permissions: [ticket.read, ticket.triage, triage_gate.review]
    data_seed: seeds/support-agent.sql       # queued Triage Gate suggestions
    feature_flags:
      triage_gate: true
      agent_workspace: true
    credentials_ref: vault://staging/novudesk/personas/support-agent
    success_criteria: >
      Triages a Triage Gate suggestion (approve or override with a reason) and sees the
      review queue count decrement, in <= 5 steps with a visible confirmation.

  - id: workspace-admin
    account_type: admin            # manages the workspace, team, billing, and integrations
    plan: business
    permissions: [ticket.read, ticket.triage, triage_gate.review,
                  team.manage, billing.manage, integrations.manage]
    data_seed: seeds/workspace-admin.sql     # a team and active integrations
    feature_flags:
      triage_gate: true
      agent_workspace: true
    credentials_ref: vault://staging/novudesk/personas/workspace-admin
    success_criteria: >
      Invites a teammate and changes the workspace plan, each reachable in <= 6 steps
      with clear confirmation; admin-only routes the other personas cannot reach.
