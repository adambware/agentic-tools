name: Onboardme deterministic eval

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  deterministic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run eval:stage-skill
      - run: npm test
      - run: npm run eval:det
